<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>野郞 운동관리 - 2단계</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=271e6bea302e93a84488444c38490d7b&autoload=false"></script>
    <style>
        body { margin: 0; padding: 15px; font-family: 'Malgun Gothic', sans-serif; background: #f4f7f6; }
        #map { width: 100%; height: 400px; border-radius: 15px; border: 2px solid #2c3e50; margin-top: 10px; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card-label { font-size: 0.8em; color: #7f8c8d; margin-bottom: 5px; }
        .card-value { font-size: 1.4em; font-weight: bold; color: #2c3e50; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn { flex: 1; padding: 15px; border: none; border-radius: 10px; font-size: 1.1em; font-weight: bold; cursor: pointer; color: white; }
        .btn-start { background: #27ae60; }
        .btn-stop { background: #e74c3c; display: none; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="card"><div class="card-label">운동 시간</div><div id="timer" class="card-value">00:00:00</div></div>
        <div class="card"><div class="card-label">이동 거리</div><div class="card-value"><span id="distance">0.00</span> km</div></div>
        <div class="card"><div class="card-label">소모 칼로리</div><div class="card-value"><span id="calories">0</span> kcal</div></div>
        <div class="card"><div class="card-label">현재 상태</div><div id="status" class="card-value" style="font-size: 1em; color: #f39c12;">대기 중</div></div>
    </div>

    <div class="btn-group">
        <button id="startBtn" class="btn btn-start" onclick="startWorkout()">🏃‍♂️ 운동 시작</button>
        <button id="stopBtn" class="btn btn-stop" onclick="stopWorkout()">⏹️ 운동 종료</button>
    </div>

    <div id="map"></div>

    <script>
        var map, marker, polyline;
        var path = [];
        var totalDistance = 0;
        var startTime, timerInterval;
        var watchId;

        // 칼로리 계산 상수 (형님 연령대 및 보통 체중 기준 MET 값 적용)
        const MET_WALKING = 3.5; 
        const WEIGHT_KG = 70; // 형님의 대략적인 체중 (나중에 수정 가능)

        function startWorkout() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('status').innerText = "기록 중...";
            
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);

            kakao.maps.load(function() {
                var mapContainer = document.getElementById('map'); 
                var mapOption = { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 3 }; 
                map = new kakao.maps.Map(mapContainer, mapOption); 
                marker = new kakao.maps.Marker({ position: map.getCenter() }); 
                marker.setMap(map); 

                polyline = new kakao.maps.Polyline({
                    path: path, strokeWeight: 5, strokeColor: '#FF0000', strokeOpacity: 0.8
                });
                polyline.setMap(map);

                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(function(pos) {
                        var lat = pos.coords.latitude;
                        var lon = pos.coords.longitude;
                        var newPos = new kakao.maps.LatLng(lat, lon);
                        
                        path.push(newPos);
                        polyline.setPath(path);

                        if (path.length > 1) {
                            var prevPos = path[path.length - 2];
                            var line = new kakao.maps.Polyline({ path: [prevPos, newPos] });
                            totalDistance += line.getLength();
                        }

                        document.getElementById('distance').innerText = (totalDistance / 1000).toFixed(2);
                        map.setCenter(newPos);
                        marker.setPosition(newPos);
                        
                        // 실시간 칼로리 계산
                        var durationHours = (new Date() - startTime) / 3600000;
                        var kcal = MET_WALKING * WEIGHT_KG * durationHours;
                        document.getElementById('calories').innerText = Math.round(kcal);

                    }, null, { enableHighAccuracy: true });
                }
            });
        }

        function updateTimer() {
            var now = new Date();
            var diff = new Date(now - startTime);
            var h = String(diff.getUTCHours()).padStart(2, '0');
            var m = String(diff.getUTCMinutes()).padStart(2, '0');
            var s = String(diff.getUTCSeconds()).padStart(2, '0');
            document.getElementById('timer').innerText = h + ":" + m + ":" + s;
        }

        function stopWorkout() {
            clearInterval(timerInterval);
            navigator.geolocation.clearWatch(watchId);
            document.getElementById('status').innerText = "운동 완료";
            document.getElementById('stopBtn').style.backgroundColor = "#95a5a6";
            
            var finalDist = document.getElementById('distance').innerText;
            var finalTime = document.getElementById('timer').innerText;
            var finalKcal = document.getElementById('calories').innerText;
            
            alert("오늘도 고생하셨습니다, 형님!\n\n📏 거리: " + finalDist + "km\n⏱ 시간: " + finalTime + "\n🔥 칼로리: " + finalKcal + "kcal");
        }
    </script>
</body>
</html>
