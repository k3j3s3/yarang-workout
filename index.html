<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>野郞 운동관리 v2.2</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=271e6bea302e93a84488444c38490d7b&autoload=false"></script>
    <style>
        /* 모든 폰트 크기 대폭 확대 및 배경 최적화 */
        body { margin: 0; padding: 10px; font-family: 'Malgun Gothic', sans-serif; background: #1a1a1a; color: white; }
        
        /* 상단 대시보드: 글씨 크기 극대화 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .card { background: #2c3e50; padding: 20px; border-radius: 20px; text-align: center; border: 2px solid #34495e; }
        .card-label { font-size: 1.4rem; color: #bdc3c7; margin-bottom: 8px; font-weight: bold; }
        .card-value { font-size: 2.5rem; font-weight: bold; color: #f1c40f; } /* 노란색 왕글씨 */
        
        /* 지도 영역 */
        #map { width: 100%; height: 300px; border-radius: 20px; border: 3px solid #f1c40f; }

        /* 버튼: 더 크고 누르기 쉽게 */
        .btn-group { display: flex; gap: 15px; margin-top: 15px; }
        .btn { flex: 1; padding: 25px; border: none; border-radius: 15px; font-size: 1.8rem; font-weight: bold; cursor: pointer; color: white; }
        .btn-start { background: #27ae60; box-shadow: 0 6px #1e8449; }
        .btn-stop { background: #e74c3c; box-shadow: 0 6px #c0392b; display: none; }
        
        /* 하단 상태바 */
        #status-bar { margin-top: 15px; text-align: center; font-size: 1.2rem; color: #95a5a6; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="card"><div class="card-label">시간</div><div id="timer" class="card-value">00:00</div></div>
        <div class="card"><div class="card-label">거리(km)</div><div id="distance" class="card-value">0.00</div></div>
        <div class="card"><div class="card-label">칼로리</div><div id="calories" class="card-value">0</div></div>
        <div class="card"><div class="card-label">상태</div><div id="status" class="card-value" style="font-size:1.5rem;">대기</div></div>
    </div>

    <div id="map"></div>

    <div class="btn-group">
        <button id="startBtn" class="btn btn-start" onclick="startWorkout()">▶ 운동 시작</button>
        <button id="stopBtn" class="btn btn-stop" onclick="stopWorkout()">■ 운동 종료</button>
    </div>

    <div id="status-bar">📡 수신중: <span id="lat">-</span>, <span id="lng">-</span></div>

    <script>
        var map, marker, polyline, startTime, timerInterval, watchId;
        var path = [];
        var totalDistance = 0;

        function startWorkout() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('status').innerText = "기록중";
            
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);

            kakao.maps.load(function() {
                var mapContainer = document.getElementById('map'); 
                var mapOption = { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 3 }; 
                map = new kakao.maps.Map(mapContainer, mapOption); 
                marker = new kakao.maps.Marker({ position: map.getCenter() }); 
                marker.setMap(map); 
                polyline = new kakao.maps.Polyline({ path: path, strokeWeight: 8, strokeColor: '#FF0000', strokeOpacity: 0.8 });
                polyline.setMap(map);

                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(function(pos) {
                        var lat = pos.coords.latitude;
                        var lon = pos.coords.longitude;
                        var newPos = new kakao.maps.LatLng(lat, lon);
                        path.push(newPos);
                        polyline.setPath(path);
                        if (path.length > 1) {
                            var line = new kakao.maps.Polyline({ path: [path[path.length - 2], newPos] });
                            totalDistance += line.getLength();
                        }
                        document.getElementById('lat').innerText = lat.toFixed(4);
                        document.getElementById('lng').innerText = lon.toFixed(4);
                        document.getElementById('distance').innerText = (totalDistance / 1000).toFixed(2);
                        map.setCenter(newPos);
                        marker.setPosition(newPos);
                        
                        // 칼로리 계산 (MET 3.5 기준)
                        var kcal = 3.5 * 70 * ((new Date() - startTime) / 3600000);
                        document.getElementById('calories').innerText = Math.round(kcal);
                    }, null, { enableHighAccuracy: true });
                }
            });
        }

        function updateTimer() {
            var diff = new Date(new Date() - startTime);
            var m = String(diff.getUTCMinutes()).padStart(2, '0');
            var s = String(diff.getUTCSeconds()).padStart(2, '0');
            document.getElementById('timer').innerText = m + ":" + s;
        }

        function stopWorkout() {
            clearInterval(timerInterval);
            navigator.geolocation.clearWatch(watchId);
            
            const dist = document.getElementById('distance').innerText;
            const time = document.getElementById('timer').innerText;
            const kcal = document.getElementById('calories').innerText;

            // 데이터 저장
            let history = JSON.parse(localStorage.getItem('yarang_history') || "[]");
            history.unshift({ date: new Date().toLocaleString(), dist, time, kcal });
            localStorage.setItem('yarang_history', JSON.stringify(history));

            // 형님 요청대로 핵심 내용만 팝업창에 표시
            alert("기록이 저장되었습니다.\n\n거리: " + dist + "km\n칼로리: " + kcal + "kcal\n시간: " + time);
            
            location.reload(); 
        }
    </script>
</body>
</html>
