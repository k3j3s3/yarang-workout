<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>野郞 운동관리 v2.1</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=271e6bea302e93a84488444c38490d7b&autoload=false"></script>
    <style>
        /* 휴대폰 화면 최적화 및 글씨 크기 대폭 확대 */
        body { margin: 0; padding: 10px; font-family: 'Malgun Gothic', sans-serif; background: #2c3e50; color: white; }
        
        /* 대시보드: 글씨를 아주 크게 설정 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .card { background: #34495e; padding: 15px; border-radius: 15px; text-align: center; border: 1px solid #455a64; }
        .card-label { font-size: 1.1rem; color: #bdc3c7; margin-bottom: 5px; }
        .card-value { font-size: 1.8rem; font-weight: bold; color: #f1c40f; } /* 노란색으로 강조 */
        
        #map { width: 100%; height: 350px; border-radius: 15px; border: 2px solid #ecf0f1; }

        /* 버튼: 손가락으로 누르기 좋게 크고 두껍게 */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn { flex: 1; padding: 20px; border: none; border-radius: 12px; font-size: 1.5rem; font-weight: bold; cursor: pointer; color: white; }
        .btn-start { background: #27ae60; box-shadow: 0 5px #1e8449; }
        .btn-stop { background: #e74c3c; box-shadow: 0 5px #c0392b; display: none; }
        
        /* 하단 상태 표시 */
        #status-bar { margin-top: 10px; text-align: center; font-size: 1rem; color: #ecf0f1; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="card"><div class="card-label">운동시간</div><div id="timer" class="card-value">00:00</div></div>
        <div class="card"><div class="card-label">거리(km)</div><div id="distance" class="card-value">0.00</div></div>
        <div class="card"><div class="card-label">칼로리</div><div id="calories" class="card-value">0</div></div>
        <div class="card"><div class="card-label">현재상태</div><div id="status" class="card-value" style="font-size:1.2rem;">대기</div></div>
    </div>

    <div id="map"></div>

    <div class="btn-group">
        <button id="startBtn" class="btn btn-start" onclick="startWorkout()">▶ 운동 시작</button>
        <button id="stopBtn" class="btn btn-stop" onclick="stopWorkout()">■ 운동 종료</button>
    </div>

    <div id="status-bar">📡 좌표: <span id="lat">-</span>, <span id="lng">-</span></div>

    <script>
        var map, marker, polyline, startTime, timerInterval, watchId;
        var path = [];
        var totalDistance = 0;

        function startWorkout() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';
            document.getElementById('status').innerText = "기록중";
            
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);

            kakao.maps.load(function() {
                var mapContainer = document.getElementById('map'); 
                var mapOption = { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 3 }; 
                map = new kakao.maps.Map(mapContainer, mapOption); 
                marker = new kakao.maps.Marker({ position: map.getCenter() }); 
                marker.setMap(map); 
                polyline = new kakao.maps.Polyline({ path: path, strokeWeight: 6, strokeColor: '#FF0000', strokeOpacity: 0.8 });
                polyline.setMap(map);

                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(function(pos) {
                        var lat = pos.coords.latitude;
                        var lon = pos.coords.longitude;
                        var newPos = new kakao.maps.LatLng(lat, lon);
                        path.push(newPos);
                        polyline.setPath(path);
                        if (path.length > 1) {
                            var line = new kakao.maps.Polyline({ path: [path[path.length - 2], newPos] });
                            totalDistance += line.getLength();
                        }
                        document.getElementById('lat').innerText = lat.toFixed(4);
                        document.getElementById('lng').innerText = lon.toFixed(4);
                        document.getElementById('distance').innerText = (totalDistance / 1000).toFixed(2);
                        map.setCenter(newPos);
                        marker.setPosition(newPos);
                        
                        // 칼로리 계산 (MET 3.5 기준)
                        var kcal = 3.5 * 70 * ((new Date() - startTime) / 3600000);
                        document.getElementById('calories').innerText = Math.round(kcal);
                    }, null, { enableHighAccuracy: true });
                }
            });
        }

        function updateTimer() {
            var diff = new Date(new Date() - startTime);
            var m = String(diff.getUTCMinutes()).padStart(2, '0');
            var s = String(diff.getUTCSeconds()).padStart(2, '0');
            document.getElementById('timer').innerText = m + ":" + s;
        }

        function stopWorkout() {
            clearInterval(timerInterval);
            navigator.geolocation.clearWatch(watchId);
            
            const record = {
                date: new Date().toLocaleString(),
                dist: document.getElementById('distance').innerText,
                time: document.getElementById('timer').innerText,
                kcal: document.getElementById('calories').innerText
            };

            // 데이터 저장 (localStorage)
            let history = JSON.parse(localStorage.getItem('yarang_history') || "[]");
            history.unshift(record); // 최신 기록을 맨 앞으로
            localStorage.setItem('yarang_history', JSON.stringify(history));

            alert("고생하셨습니다, 형님!\n\n기록이 저장되었습니다.\n거리: " + record.dist + "km\n칼로리: " + record.kcal + "kcal");
            location.reload(); // 화면 초기화
        }
    </script>
</body>
</html>
