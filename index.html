<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>野郞 운동관리 v3.1</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=271e6bea302e93a84488444c38490d7b&autoload=false"></script>
    <style>
        body { margin: 0; padding: 10px; font-family: 'Malgun Gothic', sans-serif; background: #1a1a1a; color: white; }
        
        /* 운동 선택 영역 */
        .select-group { background: #34495e; padding: 15px; border-radius: 20px; margin-bottom: 15px; text-align: center; }
        .select-label { font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; display: block; color: #f1c40f; }
        select { width: 100%; padding: 15px; font-size: 1.8rem; font-weight: bold; border-radius: 12px; border: none; background: #ecf0f1; color: #2c3e50; }

        /* 대시보드 왕글씨 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .card { background: #2c3e50; padding: 25px 5px; border-radius: 25px; text-align: center; border: 3px solid #34495e; }
        .card-label { font-size: 2rem; color: #ffffff; margin-bottom: 10px; font-weight: bold; background: #455a64; border-radius: 10px; }
        .card-value { font-size: 3.2rem; font-weight: bold; color: #f1c40f; } 

        #map { width: 100%; height: 320px; border-radius: 20px; border: 3px solid #f1c40f; margin-bottom: 15px; }

        .btn { width: 100%; padding: 25px; border: none; border-radius: 20px; font-size: 2.2rem; font-weight: bold; cursor: pointer; color: white; margin-bottom: 10px; }
        .btn-start { background: #27ae60; box-shadow: 0 8px #1e8449; }
        .btn-stop { background: #e74c3c; box-shadow: 0 8px #c0392b; display: none; }
        .btn-history { background: #3498db; box-shadow: 0 8px #2980b9; }

        /* 기록 보기 레이어 (별도 창 느낌) */
        #history-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 999; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        #history-overlay h2 { font-size: 2.5rem; color: #f1c40f; text-align: center; margin-bottom: 20px; }
        .history-item { background: #34495e; padding: 20px; border-radius: 15px; margin-bottom: 15px; font-size: 1.6rem; border-left: 10px solid #f1c40f; }
        .history-info { display: flex; justify-content: space-between; margin-top: 10px; font-size: 1.4rem; color: #bdc3c7; }

        /* 결과 보고서 화면 */
        #result-report { display: none; background: #f1c40f; color: #1a1a1a; padding: 30px; border-radius: 25px; margin-top: 20px; text-align: center; }
        #result-report h2 { font-size: 2.5rem; margin-bottom: 20px; }
        .report-item { font-size: 2.2rem; font-weight: bold; margin: 15px 0; border-bottom: 2px solid #1a1a1a; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div id="setup-area">
        <div class="select-group">
            <span class="select-label">👟 운동 종류 선택</span>
            <select id="workoutType">
                <option value="3.5">걷기 (산책)</option>
                <option value="7.0">달리기 (조깅)</option>
                <option value="6.0">등산 (트레킹)</option>
                <option value="8.0">자전거 (라이딩)</option>
            </select>
        </div>
        <button id="startBtn" class="btn btn-start" onclick="startWorkout()">▶ 운동 시작</button>
        <button class="btn btn-history" onclick="toggleHistory(true)">📅 기록 보기</button>
    </div>

    <div id="active-area" style="display:none;">
        <div class="dashboard">
            <div class="card"><div class="card-label">시간</div><div id="timer" class="card-value">00:00</div></div>
            <div class="card"><div class="card-label">거리</div><div id="distance" class="card-value">0.00</div></div>
            <div class="card"><div class="card-label">칼로리</div><div id="calories" class="card-value">0</div></div>
            <div class="card"><div class="card-label">상태</div><div id="status" class="card-value" style="font-size:1.8rem;">기록중</div></div>
        </div>
        <div id="map"></div>
        <button id="stopBtn" class="btn btn-stop" style="display:block;" onclick="stopWorkout()">■ 종료</button>
    </div>

    <div id="result-report">
        <h2>🎉 오늘 운동 결과</h2>
        <div class="report-item">📏 거리: <span id="res-dist"></span> km</div>
        <div class="report-item">🔥 칼로리: <span id="res-kcal"></span> kcal</div>
        <div class="report-item">⏱ 시간: <span id="res-time"></span></div>
        <button class="btn" style="background:#1a1a1a; color:white; margin-top:20px;" onclick="location.reload()">확인</button>
    </div>

    <div id="history-overlay">
        <h2>📅 과거 운동 기록</h2>
        <div id="history-content"></div>
        <button class="btn" style="background:#e74c3c;" onclick="toggleHistory(false)">닫기</button>
    </div>

    <script>
        var map, marker, polyline, startTime, timerInterval, watchId;
        var path = [], totalDistance = 0;

        function startWorkout() {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('active-area').style.display = 'block';
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);

            kakao.maps.load(function() {
                var mapContainer = document.getElementById('map'); 
                var mapOption = { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 3 }; 
                map = new kakao.maps.Map(mapContainer, mapOption); 
                marker = new kakao.maps.Marker({ position: map.getCenter() }); 
                marker.setMap(map); 
                polyline = new kakao.maps.Polyline({ path: path, strokeWeight: 10, strokeColor: '#FF0000', strokeOpacity: 0.8 });
                polyline.setMap(map);

                if (navigator.geolocation) {
                    watchId = navigator.geolocation.watchPosition(function(pos) {
                        var lat = pos.coords.latitude, lon = pos.coords.longitude;
                        var newPos = new kakao.maps.LatLng(lat, lon);
                        path.push(newPos);
                        polyline.setPath(path);
                        if (path.length > 1) {
                            var line = new kakao.maps.Polyline({ path: [path[path.length - 2], newPos] });
                            totalDistance += line.getLength();
                        }
                        document.getElementById('distance').innerText = (totalDistance / 1000).toFixed(2);
                        map.setCenter(newPos);
                        marker.setPosition(newPos);
                        
                        // 선택된 운동 종류의 MET 값 가져오기
                        var met = parseFloat(document.getElementById('workoutType').value);
                        var kcal = met * 70 * ((new Date() - startTime) / 3600000);
                        document.getElementById('calories').innerText = Math.round(kcal);
                    }, null, { enableHighAccuracy: true });
                }
            });
        }

        function updateTimer() {
            var diff = new Date(new Date() - startTime);
            var m = String(diff.getUTCMinutes()).padStart(2, '0');
            var s = String(diff.getUTCSeconds()).padStart(2, '0');
            document.getElementById('timer').innerText = m + ":" + s;
        }

        function stopWorkout() {
            clearInterval(timerInterval);
            navigator.geolocation.clearWatch(watchId);
            const dist = document.getElementById('distance').innerText;
            const kcal = document.getElementById('calories').innerText;
            const time = document.getElementById('timer').innerText;
            const type = document.getElementById('workoutType').options[document.getElementById('workoutType').selectedIndex].text;

            let history = JSON.parse(localStorage.getItem('yarang_history') || "[]");
            history.unshift({ date: new Date().toLocaleString(), type, dist, kcal, time });
            localStorage.setItem('yarang_history', JSON.stringify(history.slice(0, 20)));

            document.getElementById('active-area').style.display = 'none';
            document.getElementById('res-dist').innerText = dist;
            document.getElementById('res-kcal').innerText = kcal;
            document.getElementById('res-time').innerText = time;
            document.getElementById('result-report').style.display = 'block';
        }

        function toggleHistory(show) {
            if(show) {
                let history = JSON.parse(localStorage.getItem('yarang_history') || "[]");
                let listHtml = history.map(item => `
                    <div class="history-item">
                        <strong>${item.date.split(' ')[0]} ${item.type}</strong>
                        <div class="history-info">
                            <span>📏 ${item.dist}km</span>
                            <span>⏱ ${item.time}</span>
                            <span>🔥 ${item.kcal}kcal</span>
                        </div>
                    </div>
                `).join('');
                document.getElementById('history-content').innerHTML = listHtml || '<p style="text-align:center; font-size:1.5rem;">아직 기록이 없습니다.</p>';
                document.getElementById('history-overlay').style.display = 'block';
            } else {
                document.getElementById('history-overlay').style.display = 'none';
            }
        }
    </script>
</body>
</html>
