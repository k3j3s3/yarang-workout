<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>野郞 운동관리 v4.0</title>
    <style>
        body { margin: 0; padding: 15px; font-family: 'Malgun Gothic', sans-serif; background: #ffffff; color: #333; overflow-x: hidden; }
        
        /* 1. 제목 및 심볼 영역: 시원한 공간감 */
        .main-title { 
            text-align: center; font-size: 5rem; font-weight: 900; color: #2c3e50; 
            padding: 50px 0 25px 0; border-bottom: 12px solid #f1c40f; 
            margin-bottom: 0; letter-spacing: 12px;
        }
        .symbol-area {
            text-align: center; padding: 120px 0; font-size: 11rem; 
            display: flex; justify-content: center; align-items: center; gap: 30px;
        }

        /* 2. 버튼: 즉각적인 터치 반응성 강화 */
        .btn { 
            width: 100%; padding: 40px; border: none; border-radius: 35px; 
            font-size: 3rem; font-weight: 900; cursor: pointer; color: white; 
            margin-bottom: 30px; display: block; box-shadow: 0 15px #1e8449; 
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn:active { transform: translateY(8px); box-shadow: 0 7px rgba(0,0,0,0.2); }
        .btn-start { background: #27ae60; box-shadow: 0 15px #1e8449; }
        .btn-history { background: #3498db; box-shadow: 0 15px #2980b9; }
        .btn-stop { background: #e74c3c; box-shadow: 0 15px #c0392b; }

        /* 3. 선택 박스 */
        .select-container { background: #f8f9fa; padding: 35px; border-radius: 35px; margin-bottom: 40px; border: 4px solid #dfe6e9; }
        select { width: 100%; padding: 30px; font-size: 3rem; font-weight: 900; border-radius: 20px; border: 8px solid #27ae60; background: #ffffff; color: #27ae60; }

        /* 4. 지도 및 대시보드 */
        #map { width: 100%; height: 550px; border-radius: 40px; border: 10px solid #27ae60; margin-bottom: 30px; background: #f0f0f0; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: #f1f4f7; padding: 30px 5px; border-radius: 30px; text-align: center; border: 3px solid #ced6e0; }
        .card-label { font-size: 2.2rem; font-weight: 900; background: #dfe6e9; border-radius: 15px; margin-bottom: 15px; }
        .card-value { font-size: 4rem; font-weight: 900; color: #2d3436; }

        /* 5. 저장 선택 영역 */
        #save-selection { display: none; gap: 20px; margin-bottom: 30px; }
        .btn-save { background: #2ecc71; flex: 1; box-shadow: 0 12px #27ae60; font-size: 2.5rem; }
        .btn-nosave { background: #bdc3c7; flex: 1; box-shadow: 0 12px #95a5a6; font-size: 2.5rem; color: #2c3e50; }

        /* 6. 레이어(기록/결과) */
        #history-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 99999; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; }
        .history-item { background: #f8f9fa; padding: 35px; border-radius: 30px; margin-bottom: 25px; border-left: 25px solid #27ae60; position: relative; }
        .delete-btn { position: absolute; top: 30px; right: 30px; background: #e74c3c; color: white; border: none; padding: 15px 30px; border-radius: 20px; font-size: 2rem; }
    </style>
</head>
<body>

    <div id="setup-area">
        <div class="main-title">野郞 운동관리</div>
        <div class="symbol-area">🏃‍♂️ ⛰️ 🚴</div>
        <div class="select-container">
            <select id="workoutType">
                <option value="3.5">🚶‍♂️ 걷기 (산책)</option>
                <option value="7.0">🏃‍♂️ 달리기 (조깅)</option>
                <option value="6.0">⛰️ 등산 (트레킹)</option>
                <option value="8.0">🚴‍♂️ 자전거 (라이딩)</option>
            </select>
        </div>
        <button type="button" class="btn btn-start" onclick="startWorkout()">▶ 운동 시작</button>
        <button type="button" class="btn btn-history" onclick="toggleHistory(true)">📅 기록 확인</button>
    </div>

    <div id="active-area" style="display:none;">
        <div id="map"></div>
        <div class="dashboard">
            <div class="card"><div class="card-label">시간</div><div id="timer" class="card-value">00:00</div></div>
            <div class="card"><div class="card-label">거리(km)</div><div id="distance" class="card-value">0.00</div></div>
            <div class="card"><div class="card-label">현재속도</div><div id="curSpeed" class="card-value" style="color:#e67e22;">0.0</div></div>
            <div class="card"><div class="card-label">평균속도</div><div id="avgSpeed" class="card-value" style="color:#2980b9;">0.0</div></div>
            <div class="card"><div class="card-label">칼로리</div><div id="calories" class="card-value">0</div></div>
            <div class="card"><div class="card-label">상태</div><div id="status" class="card-value" style="font-size:2.2rem; color:#27ae60;">기록중</div></div>
        </div>
        <button id="stopBtn" class="btn btn-stop" onclick="confirmStop()">■ 운동 종료</button>
        <div id="save-selection">
            <button class="btn btn-save" onclick="saveAndShowResult()">💾 기록 저장</button>
            <button class="btn btn-nosave" onclick="location.reload()">❌ 저장 안 함</button>
        </div>
    </div>

    <div id="result-report" style="display:none; background:#27ae60; color:white; padding:60px 20px; border-radius:50px; text-align:center;">
        <h1 style="font-size:4.5rem; margin-bottom:40px;">🎊 운동 완료!</h1>
        <div id="report-content" style="font-size:3rem; font-weight:800; line-height:1.8;"></div>
        <button class="btn" style="background:#2c3e50; margin-top:50px; box-shadow:none;" onclick="location.reload()">확인</button>
    </div>

    <div id="history-overlay">
        <h1 style="font-size:4.5rem; color:#2c3e50; text-align:center; border-bottom:10px solid #f1c40f; padding-bottom:30px; margin-bottom:40px;">📅 운동 기록</h1>
        <div id="history-content"></div>
        <button class="btn" style="background:#2c3e50; margin-top:40px; box-shadow:none;" onclick="toggleHistory(false)">돌아가기</button>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=271e6bea302e93a84488444c38490d7b&libraries=services"></script>
    <script>
        var map, marker, polyline, startTime, timerInterval, watchId;
        var path = [], totalDistance = 0;

        function startWorkout() {
            // 버튼 누르자마자 UI부터 전환 (지도 로딩 기다리지 않음)
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('active-area').style.display = 'block';
            
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);

            // 지도는 배경에서 0.5초 뒤에 천천히 로딩
            setTimeout(function() {
                try {
                    var mapContainer = document.getElementById('map'); 
                    var mapOption = { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 3 }; 
                    map = new kakao.maps.Map(mapContainer, mapOption); 
                    marker = new kakao.maps.Marker({ position: map.getCenter() }); 
                    marker.setMap(map); 
                    polyline = new kakao.maps.Polyline({ path: path, strokeWeight: 12, strokeColor: '#FF0000', strokeOpacity: 0.8 });
                    polyline.setMap(map);

                    if (navigator.geolocation) {
                        watchId = navigator.geolocation.watchPosition(function(pos) {
                            var lat = pos.coords.latitude, lon = pos.coords.longitude;
                            var newPos = new kakao.maps.LatLng(lat, lon);
                            path.push(newPos);
                            polyline.setPath(path);
                            if (path.length > 1) {
                                var line = new kakao.maps.Polyline({ path: [path[path.length - 2], newPos] });
                                totalDistance += line.getLength();
                            }
                            document.getElementById('distance').innerText = (totalDistance / 1000).toFixed(2);
                            var speed = pos.coords.speed;
                            document.getElementById('curSpeed').innerText = (speed && speed > 0) ? (speed * 3.6).toFixed(1) : "0.0";
                            var hours = (new Date() - startTime) / 3600000;
                            document.getElementById('avgSpeed').innerText = (hours > 0) ? (parseFloat(document.getElementById('distance').innerText) / hours).toFixed(1) : "0.0";
                            var met = parseFloat(document.getElementById('workoutType').value);
                            document.getElementById('calories').innerText = Math.round(met * 70 * hours);
                            map.setCenter(newPos);
                            marker.setPosition(newPos);
                        }, null, { enableHighAccuracy: true });
                    }
                } catch(e) { console.log("지도 엔진 대기중..."); }
            }, 500);
        }

        function updateTimer() {
            var diff = new Date(new Date() - startTime);
            var m = String(diff.getUTCMinutes()).padStart(2, '0');
            var s = String(diff.getUTCSeconds()).padStart(2, '0');
            document.getElementById('timer').innerText = m + ":" + s;
        }

        function confirmStop() {
            clearInterval(timerInterval);
            if(watchId) navigator.geolocation.clearWatch(watchId);
            document.getElementById('status').innerText = "정지";
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('save-selection').style.display = 'flex';
        }

        function saveAndShowResult() {
            const dist = document.getElementById('distance').innerText;
            const avgS = document.getElementById('avgSpeed').innerText;
            const time = document.getElementById('timer').innerText;
            const kcal = document.getElementById('calories').innerText;
            const type = document.getElementById('workoutType').options[document.getElementById('workoutType').selectedIndex].text;

            let history = JSON.parse(localStorage.getItem('yarang_history') || "[]");
            history.unshift({ id: Date.now(), date: new Date().toLocaleString(), type, dist, avgS, time, kcal });
            localStorage.setItem('yarang_history', JSON.stringify(history.slice(0, 30)));

            document.getElementById('active-area').style.display = 'none';
