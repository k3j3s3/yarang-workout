<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>野郞 운동관리 v4.1</title>
    <style>
        /* 1. 기본 폰트 크기 최적화 (너무 크지 않게 조절) */
        html { font-size: 14px; } 
        body { margin: 0; padding: 15px; font-family: 'Malgun Gothic', sans-serif; background: #ffffff; color: #333; overflow-x: hidden; }
        
        .main-title { 
            text-align: center; font-size: 3.5rem; font-weight: 900; color: #2c3e50; 
            padding: 30px 0 15px 0; border-bottom: 8px solid #f1c40f; 
            margin-bottom: 0; letter-spacing: 8px;
        }

        /* 2. 심볼 공간 적당히 조절 */
        .symbol-area {
            text-align: center; padding: 60px 0; font-size: 7rem; 
            display: flex; justify-content: center; align-items: center; gap: 20px;
        }

        .select-container { background: #f8f9fa; padding: 25px; border-radius: 25px; margin-bottom: 25px; border: 2px solid #dfe6e9; }
        .select-label { font-size: 1.8rem; font-weight: 800; color: #2c3e50; display: block; margin-bottom: 15px; }
        select { width: 100%; padding: 15px; font-size: 2rem; font-weight: 900; border-radius: 15px; border: 5px solid #27ae60; background: #ffffff; color: #27ae60; }

        /* 3. 버튼: 즉각 반응형 디자인 */
        .btn { 
            width: 100%; padding: 25px; border: none; border-radius: 25px; 
            font-size: 2.2rem; font-weight: 900; cursor: pointer; color: white; 
            margin-bottom: 20px; display: block; box-shadow: 0 8px #1e8449; 
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 4px #1e8449; }
        .btn-start { background: #27ae60; }
        .btn-history { background: #3498db; box-shadow: 0 8px #2980b9; }
        .btn-history:active { box-shadow: 0 4px #2980b9; }
        .btn-stop { background: #e74c3c; box-shadow: 0 8px #c0392b; }

        /* 4. 지도 및 대시보드 (크기 최적화) */
        #map { width: 100%; height: 400px; border-radius: 30px; border: 6px solid #27ae60; margin-bottom: 20px; background: #f0f0f0; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .card { background: #f1f4f7; padding: 15px 5px; border-radius: 20px; text-align: center; border: 2px solid #ced6e0; }
        .card-label { font-size: 1.4rem; font-weight: 900; background: #dfe6e9; border-radius: 10px; margin-bottom: 8px; color: #2c3e50; }
        .card-value { font-size: 2.5rem; font-weight: 900; color: #2d3436; }

        /* 5. 저장 선택 영역 */
        #save-selection { display: none; gap: 15px; margin-bottom: 20px; }
        .btn-save { background: #2ecc71; flex: 1; font-size: 1.8rem; }
        .btn-nosave { background: #bdc3c7; flex: 1; font-size: 1.8rem; color: #2c3e50; box-shadow: 0 8px #95a5a6; }

        /* 6. 레이어(기록/결과) */
        #history-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 10000; padding: 25px; box-sizing: border-box; overflow-y: auto; }
        .history-item { background: #f8f9fa; padding: 25px; border-radius: 20px; margin-bottom: 15px; border-left: 15px solid #27ae60; position: relative; }
        .delete-btn { position: absolute; top: 20px; right: 20px; background: #e74c3c; color: white; border: none; padding: 10px 15px; border-radius: 10px; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="setup-area">
        <div class="main-title">野郞 운동관리</div>
        <div class="symbol-area">🏃‍♂️ ⛰️ 🚴</div>
        <div class="select-container">
            <span class="select-label">👟 운동 선택</span>
            <select id="workoutType">
                <option value="3.5">🚶‍♂️ 걷기 (산책)</option>
                <option value="7.0">🏃‍♂️ 달리기 (조깅)</option>
                <option value="6.0">⛰️ 등산 (트레킹)</option>
                <option value="8.0">🚴‍♂️ 자전거 (라이딩)</option>
            </select>
        </div>
        <button type="button" class="btn btn-start" onclick="startWorkout()">▶ 운동 시작</button>
        <button type="button" class="btn btn-history" onclick="toggleHistory(true)">📅 기록 확인</button>
    </div>

    <div id="active-area" style="display:none;">
        <div id="map"></div>
        <div class="dashboard">
            <div class="card"><div class="card-label">시간</div><div id="timer" class="card-value">00:00</div></div>
            <div class="card"><div class="card-label">거리(km)</div><div id="distance" class="card-value">0.00</div></div>
            <div class="card"><div class="card-label">현재속도</div><div id="curSpeed" class="card-value" style="color:#e67e22;">0.0</div></div>
            <div class="card"><div class="card-label">평균속도</div><div id="avgSpeed" class="card-value" style="color:#2980b9;">0.0</div></div>
            <div class="card"><div class="card-label">칼로리</div><div id="calories" class="card-value">0</div></div>
            <div class="card"><div class="card-label">상태</div><div id="status" class="card-value" style="font-size:1.5rem; color:#27ae60;">기록중</div></div>
        </div>
        <button id="stopBtn" class="btn btn-stop" onclick="confirmStop()">■ 운동 종료</button>
        <div id="save-selection">
            <button class="btn btn-save" onclick="saveAndShowResult()">💾 기록 저장</button>
            <button class="btn btn-nosave" onclick="location.reload()">❌ 취소</button>
        </div>
    </div>

    <div id="result-report" style="display:none; background:#27ae60; color:white; padding:40px 20px; border-radius:30px; text-align:center;">
        <h1 style="font-size:3rem;">🎊 운동 완료!</h1>
        <div id="report-content" style="font-size:2rem; font-weight:800; line-height:1.6;"></div>
        <button class="btn" style="background:#2c3e50; margin-top:30px; box-shadow:none;" onclick="location.reload()">확인</button>
    </div>

    <div id="history-overlay">
        <h1 style="font-size:3rem; color:#2c3e50; text-align:center; border-bottom:6px solid #f1c40f; padding-bottom:20px;">📅 운동 기록</h1>
        <div id="history-content"></div>
        <button class="btn" style="background:#2c3e50; margin-top:20px;" onclick="toggleHistory(false)">돌아가기</button>
    </div>

    <script>
        // 변수 선언
        var map, marker, polyline, startTime, timerInterval, watchId;
        var path = [], totalDistance = 0;

        // 1. 운동 시작 버튼 (가장 먼저 작동)
        function startWorkout() {
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('active-area').style.display = 'block';
            
            startTime = new Date();
            timerInterval = setInterval(updateTimer, 1000);

            // 지도는 별도 로드 (버튼 응답성 확보)
            loadKakaoMap();
        }

        function loadKakaoMap() {
            var script = document.createElement('script');
            script.src = "https://dapi.kakao.com/v2/maps/sdk.js?appkey=271e6bea302e93a84488444c38490d7b&autoload=false";
            document.head.appendChild(script);

            script.onload = function() {
                kakao.maps.load(function() {
                    var container = document.getElementById('map');
                    var options = { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 3 };
                    map = new kakao.maps.Map(container, options);
                    marker = new kakao.maps.Marker({ position: map.getCenter() });
                    marker.setMap(map);
                    polyline = new kakao.maps.Polyline({ path: path, strokeWeight: 8, strokeColor: '#FF0000', strokeOpacity: 0.8 });
                    polyline.setMap(map);
                    startTracking();
                });
            };
        }

        function startTracking() {
            if (navigator.geolocation) {
                watchId = navigator.geolocation.watchPosition(function(pos) {
                    var lat = pos.coords.latitude, lon = pos.coords.longitude;
                    var newPos = new kakao.maps.LatLng(lat, lon);
                    path.push(newPos);
                    polyline.setPath(path);
                    if (path.length > 1) {
                        var line = new kakao.maps.Polyline({ path: [path[path.length - 2], newPos] });
                        totalDistance += line.getLength();
                    }
                    document.getElementById('distance').innerText = (totalDistance / 1000).toFixed(2);
                    var speed = pos.coords.speed;
                    document.getElementById('curSpeed').innerText = (speed && speed > 0) ? (speed * 3.6).toFixed(1) : "0.0";
                    var hours = (new Date() - startTime) / 3600000;
                    document.getElementById('avgSpeed').innerText = (hours > 0) ? (parseFloat(document.getElementById('distance').innerText) / hours).toFixed(1) : "0.0";
                    var met = parseFloat(document.getElementById('workoutType').value);
                    document.getElementById('calories').innerText = Math.round(met * 70 * hours);
                    map.setCenter(newPos);
                    marker.setPosition(newPos);
                }, null, { enableHighAccuracy: true });
            }
        }

        function updateTimer() {
            var diff = new Date(new Date() - startTime);
            var m = String(diff.getUTCMinutes()).padStart(2, '0');
            var s = String(diff.getUTCSeconds()).padStart(2, '0');
            document.getElementById('timer').innerText = m + ":" + s;
        }

        function confirmStop() {
            clearInterval(timerInterval);
            if(watchId) navigator.geolocation.clearWatch(watchId);
            document.getElementById('status').innerText = "정지";
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('save-selection').style.display = 'flex';
        }

        function saveAndShowResult() {
            const dist = document.getElementById('distance').innerText;
            const avgS = document.getElementById('avgSpeed').innerText;
            const time = document.getElementById('timer').innerText;
            const kcal = document.getElementById('calories').innerText;
            const type = document.getElementById('workoutType').options[document.getElementById('workoutType').selectedIndex].text;

            let history = JSON.parse(localStorage.getItem('yarang_history') || "[]");
            history.unshift({ id: Date.now(), date: new Date().toLocaleString(), type, dist, avgS, time, kcal });
            localStorage.setItem('yarang_history', JSON.stringify(history.slice(0, 30)));

            document.getElementById('active-area').style.display = 'none';
            document.getElementById('report-content').innerHTML = `🏃‍♂️ ${type}<br>📏 거리: ${dist} km<br>⏱ 시간: ${time}<br>🚀 평속: ${avgS} km/h<br>🔥 칼로리: ${kcal} kcal`;
            document.getElementById('result-report').style.display = 'block';
        }

        function toggleHistory(show) {
            if(show) {
                renderHistory();
                document.getElementById('history-overlay').style.display = 'block';
            } else {
                document.getElementById('history-overlay').style.display = 'none';
            }
        }

        function renderHistory() {
            let history = JSON.parse(localStorage.getItem('yarang_history') || "[]");
            let listHtml = history.map(item => `
                <div class="history-item">
                    <button class="delete-btn" onclick="deleteHistory(${item.id})">삭제</button>
                    <strong style="font-size:1.8rem; color:#2c3e50;">${item.date.split(' ')[0]} ${item.type}</strong><br>
                    <div style="font-size:1.4rem; color:#636e72; margin-top:10px; font-weight:bold;">
                        ${item.dist}km | ${item.time} | ${item.avgS}km/h
                    </div>
                </div>
            `).join('');
            document.getElementById('history-content').innerHTML = listHtml || '<p style="text-align:center; font-size:1.8rem;">기록이 없습니다.</p>';
        }

        function deleteHistory(id) {
            if(confirm("기록을 삭제하시겠습니까?")) {
                let history = JSON.parse(localStorage.getItem('yarang_history') || "[]");
                history = history.filter(item => item.id !== id);
                localStorage.setItem('yarang_history', JSON.stringify(history));
                renderHistory();
            }
        }
    </script>
</body>
</html>
