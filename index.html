<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>野郞 운동관리</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=271e6bea302e93a84488444c38490d7b&autoload=false"></script>
    <style>
        body { margin: 0; padding: 15px; font-family: sans-serif; background: #f8f9fa; }
        #map { width: 100%; height: 450px; border-radius: 15px; border: 2px solid #2c3e50; margin-top: 10px; }
        .btn-start { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 10px; font-size: 1.2em; font-weight: bold; cursor: pointer; }
        .status-panel { padding: 15px; background: white; margin-top: 10px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <button class="btn-start" onclick="initMap()">🚀 야랑 운동 시작 (지도 켜기)</button>

    <div class="status-panel">
        📍 <b>상태:</b> <span id="status">버튼을 눌러주세요</span><br>
        위도: <span id="lat">-</span> | 경도: <span id="lng">-</span>
    </div>

    <div id="map"></div>

    <script>
        function initMap() {
            document.getElementById('status').innerText = "지도 로딩 중...";
            
            kakao.maps.load(function() {
                var mapContainer = document.getElementById('map'); 
                var mapOption = { center: new kakao.maps.LatLng(37.56682, 126.9786), level: 3 }; 
                var map = new kakao.maps.Map(mapContainer, mapOption); 
                var marker = new kakao.maps.Marker({ position: map.getCenter() }); 
                marker.setMap(map); 

                if (navigator.geolocation) {
                    document.getElementById('status').innerText = "위치 정보 요청 중...";
                    navigator.geolocation.watchPosition(function(pos) {
                        var lat = pos.coords.latitude;
                        var lon = pos.coords.longitude;
                        var locPosition = new kakao.maps.LatLng(lat, lon);
                        
                        document.getElementById('lat').innerText = lat.toFixed(5);
                        document.getElementById('lng').innerText = lon.toFixed(5);
                        document.getElementById('status').innerText = "수신 양호 (운동 중)";
                        
                        map.setCenter(locPosition);
                        marker.setPosition(locPosition);
                    }, function(err) {
                        document.getElementById('status').innerText = "오류: " + err.message;
                    }, { enableHighAccuracy: true, timeout: 10000 });
                }
            });
        }
    </script>
</body>
</html>
