<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>野郞 운동관리 v4.0</title>
    <style>
        /* [핵심 디자인] 시원시원한 폰트와 화이트 테마 */
        body { margin: 0; padding: 15px; font-family: 'Malgun Gothic', sans-serif; background: #ffffff; color: #333; }
        .main-title { text-align: center; font-size: 5rem; font-weight: 900; color: #2c3e50; padding: 50px 0 20px; border-bottom: 12px solid #f1c40f; letter-spacing: 12px; }
        .symbol-area { text-align: center; padding: 130px 0; font-size: 11rem; display: flex; justify-content: center; gap: 30px; }
        
        /* 버튼 스타일 - 터치 반응성 강화 */
        .btn { width: 100%; padding: 40px; border: none; border-radius: 35px; font-size: 3rem; font-weight: 900; cursor: pointer; color: white; margin-bottom: 30px; display: block; box-shadow: 0 15px #1e8449; }
        .btn-start { background: #27ae60; box-shadow: 0 15px #1e8449; }
        .btn-history { background: #3498db; box-shadow: 0 15px #2980b9; }
        .btn-stop { background: #e74c3c; box-shadow: 0 15px #c0392b; }
        .btn:active { transform: translateY(8px); box-shadow: 0 7px rgba(0,0,0,0.2); }

        .select-container { background: #f8f9fa; padding: 35px; border-radius: 35px; margin-bottom: 40px; border: 4px solid #dfe6e9; }
        select { width: 100%; padding: 30px; font-size: 3rem; font-weight: 900; border-radius: 20px; border: 8px solid #27ae60; background: #ffffff; color: #27ae60; }
        
        /* 지도 및 대시보드 */
        #map { width: 100%; height: 550px; border-radius: 40px; border: 10px solid #27ae60; margin-bottom: 30px; background: #f0f0f0; }
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .card { background: #f1f4f7; padding: 30px 5px; border-radius: 30px; text-align: center; border: 3px solid #ced6e0; }
        .card-label { font-size: 2.2rem; font-weight: 900; background: #dfe6e9; border-radius: 15px; margin-bottom: 10px; }
        .card-value { font-size: 4rem; font-weight: 900; }

        /* 저장 선택 창 */
        #save-selection { display: none; gap: 20px; margin-bottom: 30px; }
        .btn-save { background: #2ecc71; flex: 1; }
        .btn-nosave { background: #bdc3c7; flex: 1; color: #2c3e50; }

        /* 기록 레이어 */
        #history-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #ffffff; z-index: 99999; padding: 40px 20px; box-sizing: border-box; overflow-y: auto; }
        .history-item { background: #f8f9fa; padding: 35px; border-radius: 30px; margin-bottom: 25px; border-left: 25px solid #27ae60; position: relative; }
        .delete-btn { position: absolute; top: 30px; right: 30px; background: #e74c3c; color: white; border: none; padding: 15px 30px; border-radius: 20px; font-size: 2rem; }
    </style>
</head>
<body>

    <div id="setup-area">
        <div class="main-title">野郞 운동관리</div>
        <div class="symbol-area">🏃‍♂️ ⛰️ 🚴</div>
        <div class="select-container">
            <select id="workoutType">
                <option value="3.5">🚶‍♂️ 걷기 (산책)</option>
                <option value="7.0">🏃‍♂️ 달리기 (조깅)</option>
                <option value="6.0">⛰️ 등산 (트레킹)</option>
                <option value="8.0">🚴‍♂️ 자전거 (라이딩)</option>
            </select>
        </div>
        <button type="button" class="btn btn-start" onclick="startWorkout()">▶ 운동 시작</button>
        <button type="button" class="btn btn-history" onclick="toggleHistory(true)">📅 기록 확인</button>
    </div>

    <div id="active-area" style="display:none;">
        <div id="map"></div>
        <div class="dashboard">
            <div class="card"><div class="card-label">시간</div><div id="timer" class="card-value">00:00</div></div>
            <div class="card"><div class="card-label">거리(km)</div><div id="distance" class="card-value">0.00</div></div>
            <div class="card"><div class="card-label">현재속도</div><div id="curSpeed" class="card-value" style="color:#e67e22;">0.0</div></div>
            <div class="card"><div class="card-label">평균속도</div><div id="avgSpeed" class="card-value" style="color:#2980b9;">0.0</div></div>
            <div class="card"><div class="card-label">칼로리</div><div id="calories" class="card-value">0</div></div>
            <div class="card"><div class="card-label">상태</div><div id="status" class="card-value" style="color:#27ae60;">기록중</div></div>
        </div>
        <button id="stopBtn" type="button" class="btn btn-stop" onclick="confirmStop()">■ 운동 종료</button>
        <div id="save-selection">
            <button class="btn btn-save" onclick="saveAndShowResult()">💾 기록 저장</button>
            <button class="btn btn-nosave" onclick="location.reload()">❌ 저장 안 함</button>
        </div>
    </div>

    <div id="result-report" style="display:none; background:#27ae60; color:white; padding:60px 20px; border-radius:50px; text-align:center;">
        <h1 style="font-size:4.5rem;">🎊 운동 완료!</h1>
        <div id="report-content" style="font-size:3rem; font-weight:800; line-height:1.8;"></div>
        <button class="btn" style="background:#2c3e50; margin-top:50px;" onclick="location.reload()">확인</button>
    </div>

    <div id="history-overlay">
        <h1 style="font-size:4.5rem; text-align:center; border-bottom:10px solid #f1c40f; padding-bottom:30px;">📅 운동 기록</h1>
        <div id="history-content"></div>
        <button class="btn" style="background:#2c3e50; margin-top:40px;" onclick="toggleHistory(false)">돌아가기</button>
    </div>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=271e6bea302e93a84488444c38490d7b&libraries=services"></script>
