<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>野郞 운동관리 v6.0 (백그라운드 강화)</title>
    <style>
        /* (기존 스타일과 동일하므로 생략, 실제 파일에는 전체 포함) */
        html { font-size: 14px; } 
        body { margin: 0; padding: 10px; font-family: 'Malgun Gothic', sans-serif; background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%); color: #333; overflow-x: hidden; }
        .header-container { padding: 10px 0 20px; background: rgba(255, 255, 255, 0.7); border-radius: 0 0 30px 30px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .main-title { text-align: center; font-size: 2.5rem; font-weight: 900; color: #2c3e50; margin: 0 0 15px; letter-spacing: 4px; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        .title-divider { width: 60%; height: 5px; background: linear-gradient(to right, #27ae60, #f1c40f); margin: 0 auto; border-radius: 5px; }
        .symbol-area { text-align: center; font-size: 4.5rem; display: flex; justify-content: space-around; gap: 10px; padding: 10px 0; margin-top: 10px; }
        .setting-box { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #dfe6e9; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .setting-label { font-size: 1.2rem; font-weight: 800; color: #2c3e50; display: flex; align-items: center; gap: 8px; }
        .toggle-group { display: flex; gap: 8px; }
        .tgl-btn { padding: 10px 22px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: #bdc3c7; color: white; font-size: 1.1rem; }
        .tgl-btn.active-yes { background: #27ae60; }
        .tgl-btn.active-no { background: #e74c3c; }
        select { width: 100%; padding: 15px; font-size: 1.5rem; font-weight: 800; border-radius: 12px; border: 2px solid #27ae60; background: white; }
        #map { width: 100%; height: 280px; border-radius: 20px; border: 3px solid #27ae60; margin-bottom: 10px; background: #f9f9f9; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        .card { background: white; padding: 12px 5px; border-radius: 15px; text-align: center; border: 1px solid #ced6e0; box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .card-label { font-size: 0.9rem; font-weight: 900; background: #dfe6e9; border-radius: 6px; margin: 0 5px 8px; padding: 3px 0; }
        .card-value { font-size: 1.45rem; font-weight: 900; color: #2d3436; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 18px; font-size: 1.8rem; font-weight: 900; cursor: pointer; color: white; margin-bottom: 15px; box-shadow: 0 6px #1e8449; transition: transform 0.1s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 3px #1e8449; }
        .btn-start { background: #27ae60; }
        .btn-history { background: #3498db; box-shadow: 0 6px #2980b9; }
        .btn-photo { background: #FF9800; box-shadow: 0 6px #E68A00; margin-top: 5px; }
        .btn-stop { background: #e74c3c; box-shadow: 0 6px #c0392b; }
        #save-selection { display: none; flex-direction: column; gap: 12px; }
        .btn-save { background: #2ecc71; box-shadow: 0 6px #27ae60; }
        .btn-cancel { background: #bdc3c7; color: #2c3e50; box-shadow: 0 6px #95a5a6; }
        #custom-alert { display: none; position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); background: #2c3e50; color: white; padding: 35px; border-radius: 25px; text-align: center; z-index: 20000; width: 75%; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #history-overlay { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; height: 95%; background: #ffffff; z-index: 10000; padding: 20px; box-sizing: border-box; border-radius: 25px; box-shadow: 0 0 30px rgba(0,0,0,0.3); flex-direction: column; }
        #history-content { flex: 1; overflow-y: auto; margin: 15px 0; padding-right: 5px; }
        .history-item { background: white; padding: 18px; border-radius: 18px; margin-bottom: 15px; border-left: 10px solid #27ae60; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .delete-btn { position: absolute; top: 15px; right: 15px; background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 10px; font-size: 0.95rem; font-weight: bold; }
    </style>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=271e6bea302e93a84488444c38490d7b"></script>
</head>
<body>

    <div id="setup-area">
        <div class="header-container">
            <div class="main-title">Workout Tracker</div>
            <div class="title-divider"></div>
            <div class="symbol-area">🏃‍♂️ ⛰️ 🚴</div>
        </div>
        
        <div class="setting-box">
            <div class="setting-row">
                <span class="setting-label">🔊 소리 알림</span>
                <div class="toggle-group">
                    <button id="s-yes" class="tgl-btn active-yes" onclick="setSnd(true)">YES</button>
                    <button id="s-no" class="tgl-btn" onclick="setSnd(false)">NO</button>
                </div>
            </div>
            <select id="workoutType">
                <option value="3.5">🚶‍♂️ 걷기 (3.5 MET)</option>
                <option value="7.0">🏃‍♂️ 달리기 (7.0 MET)</option>
                <option value="6.0">⛰️ 등산 (6.0 MET)</option>
                <option value="8.0">🚴‍♂️ 자전거 (8.0 MET)</option>
            </select>
        </div>
        
        <button class="btn btn-start" onclick="startWorkout()">▶ 운동 시작</button>
        <button class="btn btn-history" onclick="toggleHistory(true)">📅 기록 확인</button>
    </div>

    <div id="active-area" style="display:none;">
        <div id="map"></div>
        <button id="photoBtn" class="btn btn-photo" onclick="recordPhotoLocation()" style="display: none;">📸 사진 지점 기록</button>
        
        <div class="dashboard">
            <div class="card"><div class="card-label">시간</div><div id="timer" class="card-value">00:00:00</div></div>
            <div class="card"><div class="card-label">거리(km)</div><div id="distance" class="card-value">0.00</div></div>
            <div class="card"><div class="card-label">평균속도</div><div id="avgSpeed" class="card-value" style="color:#2980b9;">0.0</div></div>
            <div class="card"><div class="card-label">현재속도</div><div id="curSpeed" class="card-value" style="color:#e67e22;">0.0</div></div>
            <div class="card"><div class="card-label">걸음수</div><div id="steps" class="card-value" style="color:#27ae60;">0</div></div>
            <div class="card"><div class="card-label">칼로리</div><div id="kcal" class="card-value" style="color:#c0392b;">0</div></div>
        </div>
        <button id="stopBtn" class="btn btn-stop" onclick="handleStop()">■ 운동 종료</button>
        <div id="save-selection">
            <button class="btn btn-save" onclick="saveData()">💾 기록 저장</button>
            <button class="btn btn-cancel" onclick="location.reload()">❌ 취소</button>
        </div>
    </div>

    <div id="custom-alert">
        <div id="alert-msg" style="font-size:1.6rem; font-weight:bold; margin-bottom:20px;"></div>
        <button class="btn" style="background:#27ae60; margin-bottom:0;" onclick="location.reload()">확인</button>
    </div>

    <div id="history-overlay"></div>
    <div style="text-align: right; font-size: 0.8rem; color: #888; padding: 10px;">made by KJS</div>

    <script>
        var map, marker, polyline, startTime, timerInterval, watchId, wakeLock = null;
        var path = [], totalDistance = 0, lastAnnouncedKm = 0;
        var isSnd = true, workoutStarted = false;
        var sensorSteps = 0, lastAccel = 0;
        var photoMarkers = [];

        function setSnd(val) {
            isSnd = val;
            document.getElementById('s-yes').classList.toggle('active-yes', val);
            document.getElementById('s-no').classList.toggle('active-no', !val);
        }

        function speak(text) {
            if (!isSnd) return;
            var msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ko-KR';
            window.speechSynthesis.speak(msg);
        }

        async function requestWakeLock() {
            try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) {}
        }

        function startWorkout() {
            totalDistance = 0; path = []; lastAnnouncedKm = 0; sensorSteps = 0; photoMarkers = [];
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('active-area').style.display = 'block';
            document.getElementById('photoBtn').style.display = 'block';
            
            startTime = Date.now();
            timerInterval = setInterval(updateTimer, 1000);
            workoutStarted = true;
            requestWakeLock();
            
            if (window.DeviceMotionEvent) { window.addEventListener('devicemotion', handleMotion); }
            setTimeout(initMap, 300);
            speak("운동을 시작합니다.");
        }

        function handleMotion(event) {
            if (!workoutStarted) return;
            let acc = event.accelerationIncludingGravity;
            if (!acc) return;
            let totalAcc = Math.sqrt(acc.x*acc.x + acc.y*acc.y + acc.z*acc.z);
            let delta = Math.abs(totalAcc - lastAccel);
            if (delta > 6) { sensorSteps++; updateDisplay(); }
            lastAccel = totalAcc;
        }

        function initMap() {
            var mapContainer = document.getElementById('map');
            map = new kakao.maps.Map(mapContainer, { center: new kakao.maps.LatLng(37.5668, 126.9786), level: 3 });
            marker = new kakao.maps.Marker({ position: map.getCenter(), map: map });
            polyline = new kakao.maps.Polyline({ path: path, strokeWeight: 6, strokeColor: '#FF0000', strokeOpacity: 0.8, map: map });
            startTracking();
        }

       function startTracking() {
        if (watchId) navigator.geolocation.clearWatch(watchId);
             watchId = navigator.geolocation.watchPosition(function(pos) {
        if (!workoutStarted) return;
        var lat = pos.coords.latitude, lon = pos.coords.longitude;
        var newPos = new kakao.maps.LatLng(lat, lon);
        
        if (path.length > 0) {
            var line = new kakao.maps.Polyline({ path: [path[path.length - 1], newPos] });
            var d = line.getLength();

            // [보정 포인트] GPS 정확도가 20m 이내인 좋은 신호일 때만 거리로 인정!
            // 그리고 너무 짧거나(2m 미만) 너무 긴(40m 초과) 도약은 무시합니다.
            if (pos.coords.accuracy < 20) { 
                if (d > 2.0 && d < 40.0) { 
                    totalDistance += d; 
                }
            }
        }
        path.push(newPos);
        polyline.setPath(path);
        updateDisplay(pos.coords.speed);
        map.setCenter(newPos);
        marker.setPosition(newPos);
    },
    function(err) { console.error("GPS Error", err); }, 
         { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
    }
        function recordPhotoLocation() {
            if (!workoutStarted || path.length === 0) return;
            var currentPos = path[path.length - 1];
            var pMarker = new kakao.maps.Marker({ position: currentPos, map: map });
            photoMarkers.push(pMarker);
            speak("촬영 지점 기록.");
        }

        function updateDisplay(speed) {
            var distKm = totalDistance / 1000;
            document.getElementById('distance').innerText = distKm.toFixed(2);
            
            var finalSteps = Math.max(sensorSteps, Math.floor(distKm * 1350));
            if (document.getElementById('workoutType').value == "8.0") { finalSteps = 0; }
            document.getElementById('steps').innerText = finalSteps;

            var hours = (Date.now() - startTime) / 3600000;
            var met = parseFloat(document.getElementById('workoutType').value) || 3.5;
           var kcalValue = Math.round((met * 70 * hours * 0.5) + (distKm * 60));
            document.getElementById('kcal').innerText = kcalValue;
            
            if (speed !== undefined) { document.getElementById('curSpeed').innerText = (speed > 0) ? (speed * 3.6).toFixed(1) : "0.0"; }
            document.getElementById('avgSpeed').innerText = (hours > 0.001) ? (distKm / hours).toFixed(1) : "0.0";
            
            if (Math.floor(distKm) > lastAnnouncedKm) { 
                lastAnnouncedKm = Math.floor(distKm); 
                speak(lastAnnouncedKm + " 킬로미터 통과!"); 
            }
        }

        function updateTimer() {
            var diff = Date.now() - startTime;
            var h = String(Math.floor(diff / 3600000)).padStart(2, '0');
            var m = String(Math.floor((diff % 3600000) / 60000)).padStart(2, '0');
            var s = String(Math.floor((diff % 60000) / 1000)).padStart(2, '0');
            document.getElementById('timer').innerText = h + ":" + m + ":" + s;
            updateDisplay();
        }

        function handleStop() {
            workoutStarted = false;
            clearInterval(timerInterval);
            if(watchId) navigator.geolocation.clearWatch(watchId);
            if(wakeLock) { wakeLock.release(); wakeLock = null; }
            window.removeEventListener('devicemotion', handleMotion);
            speak("운동 종료.");
            document.getElementById('stopBtn').style.display = 'none';
            document.getElementById('photoBtn').style.display = 'none';
            document.getElementById('save-selection').style.display = 'flex';
        }

        function saveData() {
            const hData = {
                id: Date.now(),
                date: new Date().toLocaleString(),
                type: document.getElementById('workoutType').options[document.getElementById('workoutType').selectedIndex].text.split(' ')[0],
                dist: document.getElementById('distance').innerText,
                time: document.getElementById('timer').innerText,
                steps: document.getElementById('steps').innerText,
                kcal: document.getElementById('kcal').innerText
            };
            let h = JSON.parse(localStorage.getItem('yarang_history') || "[]");
            h.unshift(hData);
            localStorage.setItem('yarang_history', JSON.stringify(h));
            document.getElementById('alert-msg').innerText = "기록 저장 완료!";
            document.getElementById('custom-alert').style.display = 'block';
        }

        function toggleHistory(show) {
            const overlay = document.getElementById('history-overlay');
            if(show) { renderHistory(); overlay.style.display = 'flex'; } 
            else { overlay.style.display = 'none'; }
        }

        function renderHistory() {
            let h = JSON.parse(localStorage.getItem('yarang_history') || "[]");
            document.getElementById('history-overlay').innerHTML = `
                <h2 style="text-align:center; margin-top:0; color:#2c3e50;">📅 운동 기록 요약</h2>
                <div id="history-content">
                    ${h.length > 0 ? h.map(i => `
                        <div class="history-item">
                            <button class="delete-btn" onclick="delH(${i.id})">삭제</button>
                            <strong>${i.date} [${i.type}]</strong><br>
                            <span>거리: ${i.dist}km | 시간: ${i.time}<br>걸음: ${i.steps}보 | 칼로리: ${i.kcal}kcal</span>
                        </div>
                    `).join('') : '<p style="text-align:center; padding:20px;">기록이 아직 없어요! 😊</p>'}
                </div>
                <button class="btn" style="background:#2c3e50; margin-bottom:0;" onclick="toggleHistory(false)">닫기</button>
            `;
        }

        function delH(id) {
            if(confirm("삭제할까요?")) {
                let h = JSON.parse(localStorage.getItem('yarang_history') || "[]");
                localStorage.setItem('yarang_history', JSON.stringify(h.filter(i => i.id !== id)));
                renderHistory();
            }
        }

        // 백그라운드 복귀 시 더 즉각적으로 반응하도록 수정
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible' && workoutStarted) {
                requestWakeLock(); // 웨이크락 재요청
                startTracking();   // GPS 즉시 재가동
            }
        });
    </script>
</body>
</html>
