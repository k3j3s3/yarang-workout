<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>野郞 운동관리 - 지도 테스트</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=6abfda3c10053ca5baa728cd01a41803&autoload=false"></script>
    <style>
        #map { width: 100%; height: 400px; border-radius: 10px; border: 2px solid #34495e; }
        .status-panel { padding: 15px; background: #ecf0f1; margin-bottom: 10px; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="status-panel">
        📍 현재 상태: <span id="status">지도 로딩 중...</span><br>
        위도: <span id="lat">-</span> / 경도: <span id="lng">-</span>
    </div>

    <div id="map"></div>

    <script>
        // 1. 카카오 지도가 완전히 로드될 때까지 기다린 후 실행합니다.
        kakao.maps.load(function() {
            var mapContainer = document.getElementById('map'); 
            var mapOption = { 
                center: new kakao.maps.LatLng(37.566826, 126.9786567), 
                level: 3 
            }; 

            var map = new kakao.maps.Map(mapContainer, mapOption); 
            var marker = new kakao.maps.Marker({ position: map.getCenter() }); 
            marker.setMap(map); 

            document.getElementById('status').innerText = "GPS 신호 대기 중...";

            // 2. 실시간 위치 추적 시작
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(function(position) {
                    var lat = position.coords.latitude; 
                    var lon = position.coords.longitude; 
                    var locPosition = new kakao.maps.LatLng(lat, lon);
                    
                    document.getElementById('lat').innerText = lat.toFixed(5);
                    document.getElementById('lng').innerText = lon.toFixed(5);
                    document.getElementById('status').innerText = "운동 중 (위치 수신 양호)";

                    map.setCenter(locPosition);
                    marker.setPosition(locPosition);
                    
                }, function(error) {
                    document.getElementById('status').innerText = "GPS 연결 실패: " + error.message;
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                });
            } else {
                alert("이 브라우저는 GPS를 지원하지 않습니다.");
            }
        });
    </script>
</body>
</html>
