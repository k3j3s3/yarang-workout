<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>野郞 운동관리 v3.2</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=271e6bea302e93a84488444c38490d7b&autoload=false"></script>
    <style>
        body { margin: 0; padding: 10px; font-family: 'Malgun Gothic', sans-serif; background: #1a1a1a; color: white; }
        
        /* 1. 메인 제목 스타일 (멋있게!) */
        .main-title { 
            text-align: center; font-size: 3rem; font-weight: 900; color: #f1c40f; 
            padding: 20px 0; border-bottom: 3px double #f1c40f; margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); letter-spacing: 5px;
        }

        /* 2. 운동선택 영역 (글자 크게, 박스 크게) */
        .select-container { background: #34495e; padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .select-label { font-size: 2.2rem; font-weight: bold; color: #ffffff; display: block; margin-bottom: 15px; }
        select { 
            width: 100%; padding: 20px; font-size: 2.5rem; font-weight: bold; 
            border-radius: 15px; border: 4px solid #f1c40f; background: #ecf0f1; color: #2c3e50; 
        }

        /* 대시보드 왕글씨 */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .card { background: #2c3e50; padding: 25px 5px; border-radius: 25px; text-align: center; border: 3px solid #34495e; }
        .card-label { font-size: 2rem; color: #ffffff; margin-bottom: 10px; font-weight: bold; background: #455a64; border-radius: 10px; }
        .card-value { font-size: 3.5rem; font-weight: bold; color: #f1c40f; } 

        #map { width: 100%; height: 350px; border-radius: 20px; border: 4px solid #f1c40f; margin-bottom: 20px; }

        /* 버튼 스타일 */
        .btn { width: 100%; padding: 30px; border: none; border-radius: 25px; font-size: 2.5rem; font-weight: bold; cursor: pointer; color: white; margin-bottom: 15px; }
        .btn-start { background: #27ae60; box-shadow: 0 10px #1e8449; }
        .btn-stop { background: #e74c3c; box-shadow: 0 10px #c0392b; display: none; }
        .btn-history { background: #3498db; box-shadow: 0 10px #2980b9; }

        /* 기록 보기 창 */
        #history-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; z-index: 999; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .history-item { background: #34495e; padding: 20px; border-radius: 20px; margin-bottom: 15px; font-size: 1.8rem; border-left: 12px solid #f1c40f; }

        /* 결과 보고서 */
        #result-report { display: none; background: #f1c40f; color: #1a1a1a; padding: 40px 20px; border-radius: 30px; text-align: center; }
        .report-item { font-size: 2.5rem; font-weight: bold; margin: 20px 0; border-bottom: 3px solid #1a1a1a; padding-bottom: 10px; }
    </style>
</head>
<body>

    <div class="main-title">野郞 운동관리</div>

    <div id="setup-area">
        <div class="select-container">
            <span class="select-label">👟 운동선택</span>
            <select id="workoutType">
                <option value="3.5">걷기 (산책)</option>
                <option value="7.0">달리기 (조깅)</option>
                <option value="6.0">등산 (트레킹)</option>
                <option value="8.0">자전거 (라이딩)</option>
            </select>
        </div>
        
        <button id="startBtn" class="btn btn-start" onclick="startWorkout()">▶ 운동 시작</button>
        <button class="btn btn-history" onclick="toggleHistory(true)">📅 기록 보기</button>
    </div>

    <div id="active-area" style="display:none;">
        <div class="dashboard">
            <div class="card"><div class="card-label">시간</div><div id="timer" class="card-value">00:00</div></div>
            <div class="card"><div class="card-label">거리</div><div id="distance" class="card-value">0.00</div></div>
            <div class="card"><div class="card-label">칼로리</div><div id="calories" class="card-value">0</div></div>
            <div class="card"><div class="card-label">상태</div><div id="status" class="card-value" style="font-size:2rem;">기록중</div></div>
        </div>
        
        <div id="map"></div>
        
        <button id="stopBtn" class="btn btn-stop" style="display:block;" onclick="stopWorkout()">■ 운동 종료</button>
    </div>

    <div id="result-report">
        <h1 style="font-size:3rem;">🏃‍♂️ 운동 완료!</h1>
        <div class="report-item">📏 거리: <span id="res-dist"></span> km</div>
